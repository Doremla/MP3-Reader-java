apply plugin: 'com.android.application'

android {
    namespace 'com.example.myapp'
    compileSdk 34

    defaultConfig {
        applicationId "com.example.myapp"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    // The "Brain" of your UI (Fixes AppCompatActivity and basic Android components)
    implementation 'androidx.appcompat:appcompat:1.6.1'

    // Google Material components (Fixes Buttons, Lists, and Layouts)
    implementation 'com.google.android.material:material:1.9.0'

    // Core Android functions (Fixes ContextCompat and Permission handling)
    implementation 'androidx.core:core:1.10.1'

    // Constraint Layout (Usually needed for modern Android UI)
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    // This constraint forces Gradle to use the consolidated stdlib
    // and ignores the old, conflicting jdk7/jdk8 modules.
    constraints {
        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.0") {
            because("kotlin-stdlib-jdk7 is now part of kotlin-stdlib")
        }
        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.0") {
            because("kotlin-stdlib-jdk8 is now part of kotlin-stdlib")
        }
    }

    // Your existing dependencies...
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.9.0'
    // ...
}